# MyST / Jupyter Book — https://mystmd.org/guide/configuration
# Book site:  myst start  |  myst build  |  jupyter-book build --site
#   (use `jupyter-book build --site` with no path; do not pass `.` — avoids EISDIR on some versions)
# Exports:     jupyter-book build --pdf <file.md>  (etc.)
#
# SINGLE SOURCE OF TRUTH
# Everything in project.toc is authoritative. Derive from this tree — do not maintain a parallel copy:
#   • Static site / exports: myst build or jupyter-book build --site → _build/
#   • iNQspace: import or sync course text + notebooks from these paths (execution stays in iNQspace)
# README.md is excluded here on purpose: GitHub landing stub only; it points to this project.
version: 1
project:
  title: Mag.AI-Marketing
  description: Castalia Institute — Magister of Artificial Intelligence in Marketing
  keywords:
    - marketing
    - artificial intelligence
    - Castalia
    - Magisterium
  exclude:
    - README.md
    - pages/README.md
    - slides/README.md
    - exercises/README.md
  toc:
    - file: index.md
    - title: Public pages
      children:
        - file: pages/program-overview.md
        - file: pages/certificate.md
        - file: pages/curriculum-at-a-glance.md
    - title: Program docs
      children:
        - file: docs/DESIGN.md
        - file: docs/CURRICULUM_FULL.md
        - file: docs/ASSESSMENT.md
        - file: docs/MCP_MARKETING.md
    - title: Slides
      children:
        - file: slides/ain-m6001_lecture01_intro.md
    - title: Exercises
      children:
        - file: exercises/ain-m6001/warmup.md
        - file: exercises/ain-m6001/mcp_tool_design.md
    - title: AIN-M6001 — Personal Attention & Influence Systems
      children:
        - file: courses/AIN-M6001/SYLLABUS.md
        - pattern: courses/AIN-M6001/lectures/*.md
        - pattern: courses/AIN-M6001/samwise/*.md
        - pattern: courses/AIN-M6001/notebooks/*.ipynb
site:
  template: book-theme
  actions:
    - title: Jupyter Book
      url: https://jupyterbook.org/stable/
    - title: MyST Guide
      url: https://mystmd.org/guide
