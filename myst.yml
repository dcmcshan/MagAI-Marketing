# Program hub — public site root (each course is a separate book under courses/<code>/myst.yml)
version: 1
project:
  title: Mag.AI-Marketing
  description: Graduate-level AI for marketing leaders — measurable campaigns, governed toolchains, and Magisterium credential work you can defend.
  keywords:
    - marketing
    - artificial intelligence
    - Castalia
    - Magisterium
  exclude:
    - README.md
    - pages/README.md
    - scripts/**
    - courses/**
    - slides/**
    - exercises/**
  toc:
    - file: index.md
    - file: catalog.md
    - title: Orientation
      children:
        - file: pages/program-overview.md
        - file: pages/curriculum-at-a-glance.md
        - file: pages/certificate.md
    - title: Program reference
      children:
        - file: docs/DESIGN.md
        - file: docs/CURRICULUM_FULL.md
        - file: docs/MCP_MARKETING.md
        - file: docs/ASSESSMENT.md
site:
  template: book-theme
  options:
    logo_text: Mag.AI-Marketing
    style: styles/site.css
  actions:
    - title: Castalia — Magisterium
      url: https://magisterium.castalia.institute/magai/
